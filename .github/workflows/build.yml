name: Build APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install buildozer cython
    
    - name: Accept Android licenses
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-17-jdk
        
        # Создаем директорию для лицензий
        mkdir -p $ANDROID_HOME/licenses
        
        # Принимаем все лицензии Android SDK
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_HOME/licenses/android-sdk-license
        echo "84831b9409646a918e30573bab4c9c91346d8abd" >> $ANDROID_HOME/licenses/android-sdk-license
        echo "d975f751698a77b662f1254ddbeed3901e976f5a" >> $ANDROID_HOME/licenses/android-sdk-license
        echo "8933bad161af4178b1185d1a37fbf41ea5269c55" >> $ANDROID_HOME/licenses/android-sdk-license
        echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_HOME/licenses/android-sdk-license
        echo "013032b0a2534d41bb7e6ed51c6e8aeb0a9dbd4c" >> $ANDROID_HOME/licenses/android-sdk-license
        echo "504667f4c0de7af1a06de9f4b1727b84351f2910" >> $ANDROID_HOME/licenses/android-sdk-license
        echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > $ANDROID_HOME/licenses/android-sdk-preview-license
        
        # Устанавливаем стабильные build-tools (версия 33.0.0)
        yes | sdkmanager "build-tools;33.0.0"
        yes | sdkmanager "platforms;android-33"
        yes | sdkmanager "platform-tools"
    
    - name: Build APK
      run: |
        cd $GITHUB_WORKSPACE
        buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: bin/*.apk
