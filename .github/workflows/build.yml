name: Build APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install buildozer cython
        sudo apt-get update
        sudo apt-get install -y python3-pip build-essential git python3-dev libffi-dev libssl-dev libgdk-pixbuf2.0-dev libmpc-dev libmpfr-dev libgmp-dev autoconf libtool pkg-config openjdk-11-jdk
    
    - name: Build APK
      run: |
        cd $GITHUB_WORKSPACE
        buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: app-debug
        path: bin/*.apk
