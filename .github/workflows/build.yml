name: Build APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install Flet
      run: |
        pip install flet flet-cli
    
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.4'
        channel: 'stable'
        cache: true
    
    - name: Accept licenses
      run: |
        yes | flutter doctor --android-licenses || true
    
    - name: Build APK with Flet (non-interactive)
      run: |
        cd $GITHUB_WORKSPACE
        # Устанавливаем переменные для авто-подтверждения
        export FLET_CLI_AUTO_ACCEPT=1
        export CI=true
        # Строим APK в неинтерактивном режиме
        echo "y" | flet build apk
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: build/**/*-release.apk
